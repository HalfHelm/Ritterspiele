<!DOCTYPE html>
<html lang="en-us">
<head>
<meta charset="utf-8">
<title>Unity Web Player</title>

<style>
body {
  margin: 0;
  background: #d9d9d9;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* Container (klein) */
#unity-container {
  width: 960px;
  height: 540px;
  position: relative;
  background: black;
  overflow: hidden;
}

/* Canvas wird NICHT gestretcht */
#unity-canvas {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
}
</style>
</head>

<body>

<div id="unity-container">
  <canvas id="unity-canvas"></canvas>
</div>

<script>
var canvas = document.querySelector("#unity-canvas");

var buildUrl = "Build";
var loaderUrl = buildUrl + "/Pagen-Simulator.loader.js";

var config = {
  dataUrl: buildUrl + "/Pagen-Simulator.data",
  frameworkUrl: buildUrl + "/Pagen-Simulator.framework.js",
  codeUrl: buildUrl + "/Pagen-Simulator.wasm",

  /* ❗ WICHTIG: Unity NICHT an Canvas koppeln */
  matchWebGLToCanvasSize: false
};

/* 🔥 DAS ist der entscheidende Part */
function fitCanvas() {
  const container = document.getElementById("unity-container");

  const containerWidth = container.clientWidth;
  const containerHeight = container.clientHeight;

  const gameAspect = 16 / 9;

  let width = containerWidth;
  let height = width / gameAspect;

  if (height > containerHeight) {
    height = containerHeight;
    width = height * gameAspect;
  }

  canvas.style.width = width + "px";
  canvas.style.height = height + "px";

  /* interne Auflösung = dein Unity Spiel */
  canvas.width = 1920;
  canvas.height = 1080;
}

window.addEventListener("resize", fitCanvas);
fitCanvas();

var script = document.createElement("script");
script.src = loaderUrl;

script.onload = () => {
  createUnityInstance(canvas, config);
};

document.body.appendChild(script);
</script>

</body>
</html>
